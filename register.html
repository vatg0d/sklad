<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Складской учет</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <h1>Складской учет</h1>
        <h2>Регистрация</h2>
        
        <form id="registerForm" onsubmit="event.preventDefault(); register()">
            <div class="form-group">
                <label for="regName">Имя</label>
                <input type="text" id="regName" placeholder="Иван Иванов" required>
            </div>
            
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="regPassword">Пароль</label>
                <input type="password" id="regPassword" placeholder="••••••" required minlength="6">
                <small style="color: #666; font-size: 12px;">Минимум 6 символов</small>
            </div>
            
            <div class="form-group">
                <label for="regConfirmPassword">Подтверждение пароля</label>
                <input type="password" id="regConfirmPassword" placeholder="••••••" required>
            </div>
            
            <button type="submit" id="registerBtn">Зарегистрироваться</button>
        </form>
        
        <div id="message" style="margin-top: 20px;"></div>
        
        <p style="text-align: center; margin-top: 20px;">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
