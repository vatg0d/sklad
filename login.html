<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - Складской учет</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <h1>Складской учет</h1>
        <h2>Вход в систему</h2>
        
        <form id="loginForm" onsubmit="event.preventDefault(); login()">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••" required>
            </div>
            <a href="warehouse.html">Войти</a>

        </form>
        
        <div id="message"></div>
        
        <p style="text-align: center; margin-top: 20px;">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </p>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
